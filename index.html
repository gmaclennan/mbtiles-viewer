<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <!-- Deliberately NO `theme-color` meta. iOS Safari uses `theme-color` as
         the tint behind its translucent chrome (URL bar + status bar). When
         it's set, the chrome paints as a flat coloured curtain. With it
         absent, iOS falls back to its default frosted-glass behaviour, which
         actually shows the page content (the map canvas) blurred through. -->
    <!-- When installed to the home screen on iOS, run as a standalone PWA
         (no Safari chrome) and let the page draw behind the status bar so
         the map stays edge-to-edge. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Map Downloader</title>
  </head>
  <body>
    <div id="app">
      <div id="map" class="map-host"></div>
      <div id="map-overlay" class="map-overlay"></div>
    </div>

    <!-- Drop overlay (drag-drop of an .mbtiles basemap or .geojson overlay) -->
    <div id="drop-overlay" class="drop-overlay hidden">
      <svg class="drop-overlay-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 16V4m0 0l-4 4m4-4l4 4M4 20h16"
              transform="rotate(180 12 12)" />
      </svg>
      <p class="drop-overlay-title">Drop a file</p>
      <p class="drop-overlay-sub">.mbtiles basemap &nbsp;·&nbsp; .geojson overlay</p>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
